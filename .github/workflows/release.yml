name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  static-checks:
    name: 🛡️ Static Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: sudo apt-get install -y shfmt shellcheck

      - run: bun run typecheck

      - run: bun run lint

      - run: bun run check:format

      - run: bun run check:spell

      - run: bun run check:shell

  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run test:coverage

  build:
    name: 📦 Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run build

      - uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: release/
          retention-days: 7

  e2e-tests:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(node -p "require('./package.json').devDependencies['@playwright/test']")" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.pw-version.outputs.version }}

      - run: bunx playwright install chromium --with-deps

      - run: bun run build

      - run: bun run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  release:
    name: 🏷️ Release
    runs-on: ubuntu-latest
    needs: [static-checks, unit-tests, e2e-tests]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: extension-zip
          path: release/

      - name: Create GitHub Release
        run: bunx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach zip to release
        run: gh release upload ${{ github.ref_name }} release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: 🚀 Publish to Chrome Web Store
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension-zip
          path: release/

      - name: Publish to Chrome Web Store
        env:
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: bunx chrome-webstore-upload-cli upload --source release/*.zip
